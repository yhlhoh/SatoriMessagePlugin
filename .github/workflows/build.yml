name: Build and Package

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - run: dotnet restore SatoriMessagePlugin.csproj

      - run: dotnet publish SatoriMessagePlugin.csproj -c Release -o publish

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path publish/* -DestinationPath SatoriMessagePlugin.cipx -Force
          (Get-FileHash SatoriMessagePlugin.cipx -Algorithm SHA256).Hash | Out-File SatoriMessagePlugin.cipx.sha256 -Encoding ASCII

      - uses: actions/upload-artifact@v4
        with:
          name: SatoriMessagePlugin
          path: |
            SatoriMessagePlugin.cipx
            SatoriMessagePlugin.cipx.sha256
